version: '3.8'

services:
  suricata:
    image: jasonish/suricata:latest
    container_name: suricata
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - SYS_NICE
      - NET_RAW
    volumes:
      - /opt/project/suricata/logs:/var/log/suricata
      - /opt/project/suricata/rules:/etc/suricata/rules
      - ./suricata.yaml:/etc/suricata/suricata.yaml:rw
    restart: unless-stopped
    command: -i eth0

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: filebeat
    user: root
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /opt/project/suricata/logs:/var/log/suricata:ro
      - /var/lib/filebeat:/usr/share/filebeat/data
    depends_on:
      - suricata
    restart: unless-stopped
    command: filebeat -e -strict.perms=false

  juiceshop:
    image: bkimminich/juice-shop:latest
    container_name: juiceshop
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
