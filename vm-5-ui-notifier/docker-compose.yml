version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    environment:
      - POSTGRES_HOST=${VM4_PUBLIC_IP}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=threat_intel
      - POSTGRES_USER=tiuser
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - project-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - project-network

  notifier:
    build:
      context: ./notifier
      dockerfile: Dockerfile
    container_name: notifier
    environment:
      - POSTGRES_HOST=${VM4_PUBLIC_IP}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=threat_intel
      - POSTGRES_USER=tiuser
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_TO=${EMAIL_TO}
    restart: unless-stopped
    networks:
      - project-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - project-network

networks:
  project-network:
    driver: bridge
